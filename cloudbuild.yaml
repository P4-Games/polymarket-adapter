steps:
  - name: 'gcr.io/cloud-builders/npm'
    id: CreateEnv
    args: ['run', 'create-env']
    env:
      - BUN_ENV=${_BUN_ENV}
      - ALLOWED_WS_ORIGINS=${_ALLOWED_WS_ORIGINS}
    secretEnv: [
      'AUTH_TOKEN'
    ]

  - name: 'gcr.io/cloud-builders/docker'
    id: Build
    args: [
      'build',
      '--no-cache',
      '-t',
      '$_AR_HOSTNAME/$PROJECT_ID/cloud-run-source-deploy/$REPO_NAME/$_SERVICE_NAME:$COMMIT_SHA',
      '-f',
      'Dockerfile',
      '--build-arg=BUN_ENV=${_BUN_ENV}',
      '--build-arg=AUTH_TOKEN=$$AUTH_TOKEN',
      '--build-arg=ALLOWED_WS_ORIGINS=${_ALLOWED_WS_ORIGINS}',
      '.'
    ]
    secretEnv: [
      'AUTH_TOKEN'
    ]

  - name: 'gcr.io/cloud-builders/docker'
    id: Push
    args: [
      'push',
      '$_AR_HOSTNAME/$PROJECT_ID/cloud-run-source-deploy/$REPO_NAME/$_SERVICE_NAME:$COMMIT_SHA',
    ]

  - name: 'gcr.io/cloud-builders/gcloud'
    id: Deploy
    entrypoint: gcloud
    args: [
      'run',
      'deploy',
      '$_SERVICE_NAME',
      '--platform',
      'managed',
      '--region',
      '$_DEPLOY_REGION',
      '--image',
      '$_AR_HOSTNAME/$PROJECT_ID/cloud-run-source-deploy/$REPO_NAME/$_SERVICE_NAME:$COMMIT_SHA',
      '--labels',
      'managed-by=gcp-cloud-build-deploy-cloud-run,commit-sha=$COMMIT_SHA,gcb-build-id=$BUILD_ID,gcb-trigger-id=$_TRIGGER_ID',
      '--quiet',
      '--allow-unauthenticated'
    ]

availableSecrets:
  secretManager:
    - versionName: projects/$PROJECT_ID/secrets/${_AUTH_TOKEN_SECRET_NAME}/versions/latest
      env: 'AUTH_TOKEN'

# Overridable per-trigger. Empty allowlist = allow all origins (ok for dev).
substitutions:
  _ALLOWED_WS_ORIGINS: ''

images:
  - $_AR_HOSTNAME/$PROJECT_ID/cloud-run-source-deploy/$REPO_NAME/$_SERVICE_NAME:$COMMIT_SHA

options:
  logging: CLOUD_LOGGING_ONLY
